<!doctype html>
<html>
<body style="font-family: Arial, sans-serif; background:#f5f7fb; padding:24px;">
  <div style="max-width:560px;margin:auto;background:#ffffff;border-radius:14px;padding:28px;border:1px solid #e5e7eb;">
    <h2 style="margin-top:0;color:#111827;">Password Reset OTP</h2>
    <p>Hello {{ user.full_name }},</p>
    <p>Use the following OTP to reset your password:</p>
    <div style="font-size:32px;font-weight:700;letter-spacing:8px;text-align:center;background:#eef2ff;color:#3730a3;padding:16px;border-radius:12px;margin:24px 0;">{{ otp }}</div>
    <p>This OTP expires in <strong>{{ expires_minutes }} minutes</strong>.</p>
    <p style="color:#6b7280;font-size:13px;">If you did not request this, please ignore this email.</p>
  </div>
</body>
</html>
