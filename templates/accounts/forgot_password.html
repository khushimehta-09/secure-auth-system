{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5"><div class="card auth-card shadow-sm"><div class="card-body p-4 p-lg-5"><h2 class="fw-bold">{{ role }} Password Reset</h2><p class="text-muted">Enter your registered email. A 6-digit OTP expires in 5 minutes.</p><form method="post">{% csrf_token %}{% include 'accounts/partials_form.html' %}<button class="btn btn-primary w-100">Send OTP</button></form></div></div></div></div>
{% endblock %}
